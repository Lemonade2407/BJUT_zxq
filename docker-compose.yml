services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: bjut-zxq-mysql
    restart: always
    # 使用 host 网络,避免 docker-proxy 问题
    network_mode: host
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: bjut_zxq
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot后端
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bjut-zxq-backend
    restart: always
    # 使用 host 网络,与前端通信
    network_mode: host
    environment:
      # 数据库配置(使用 localhost,因为 backend 使用 host 网络)
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/bjut_zxq?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      
      # OSS配置(从环境变量读取)
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      
      # JVM参数
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
      
      TZ: Asia/Shanghai
    # 不使用端口映射,通过 Nginx 代理访问
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Vue前端(Nginx)
  frontend:
    build:
      context: ./Vue
      dockerfile: Dockerfile.frontend
    container_name: bjut-zxq-frontend
    restart: always
    # 使用 host 网络,避免 docker-proxy 问题
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL证书目录(可选)
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mysql_data:
    driver: local
